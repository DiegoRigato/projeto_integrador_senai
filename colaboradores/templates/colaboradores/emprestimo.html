{% extends 'colaboradores/base.html' %}

{% block conteudo %}
<div class="card shadow-sm">
    <div class="card-header bg-dark text-white">
        <h4 class="mb-0">Novo Empréstimo / Entrega de EPI</h4>
    </div>
    <div class="card-body">
        <form method="POST">
            {% csrf_token %}
            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Colaborador</label>
                    <select name="colaborador" class="form-select" required>
                        <option value="">Selecione o colaborador...</option>
                        {% for c in colaboradores %}
                            <option value="{{ c.id }}">{{ c.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Equipamento (EPI)</label>
                    <select name="equipamento" class="form-select" required>
                        <option value="">Selecione o EPI...</option>
                        {% for e in equipamentos %}
                            <option value="{{ e.id }}">{{ e.nome }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div class="row">
                <div class="col-md-4 mb-3">
                    <label class="form-label">Data de Entrega</label>
                    <input type="datetime-local" name="data_entrega" class="form-control" value="{{ hoje }}" required>
                </div>
                
                <div class="col-md-4 mb-3" id="bloco_data_prevista">
                    <label class="form-label">Previsão de Devolução</label>
                    <input type="datetime-local" name="data_prevista" id="id_data_prevista" class="form-control" required>
                </div>
                
                <div class="col-md-4 mb-3">
                    <label class="form-label">Status Inicial</label>
                    <select name="status" id="id_status" class="form-select" required>
                        <option value="emprestado">Emprestado</option>
                        <option value="fornecido">Fornecido</option>
                    </select>
                </div>
            </div>

            <hr>
            <button type="submit" class="btn btn-primary">Registrar Empréstimo</button>
            <a href="{% url 'listagem_colaboradores' %}" class="btn btn-secondary">Cancelar</a>
            <a href="{% url 'relatorio_emprestimos' %}" class="btn btn-secondary">Ver Relatório</a>
        </form>
    </div>
</div>

<script>
    const statusSelect = document.getElementById('id_status');
    const blocoDataPrevista = document.getElementById('bloco_data_prevista');
    const inputDataPrevista = document.getElementById('id_data_prevista');

    function alternarDataPrevista() {
        if (statusSelect.value === 'fornecido') {
            blocoDataPrevista.style.display = 'none'; 
            inputDataPrevista.required = false;       
            inputDataPrevista.value = '';             
        } else {
            blocoDataPrevista.style.display = 'block';
            inputDataPrevista.required = true;        
        }
    }

    
    statusSelect.addEventListener('change', alternarDataPrevista);
    
    
    window.addEventListener('DOMContentLoaded', alternarDataPrevista);
</script>
{% endblock %}
