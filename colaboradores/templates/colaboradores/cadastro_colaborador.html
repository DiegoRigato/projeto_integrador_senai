{% load django_bootstrap5 %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastro de Colaborador - Têxtil</title>
    {% bootstrap_css %}
</head>
<body class="bg-light">
    <div class="container mt-5">
        <div class="card shadow">
            <div class="card-header bg-primary text-white">
                <h3>Novo Colaborador</h3>
            </div>
            <div class="card-body">
                {% bootstrap_messages %}

                <form method="POST">
                    {% csrf_token %}
                    <div class="mb-3">
                        <label class="form-label">Nome Completo</label>
                        <input type="text" name="nome" class="form-control" required>
                    </div>
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">CPF</label>
                            <input type="text" name="cpf" class="form-control" placeholder="000.000.000-00" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Cargo</label>
                            <input type="text" name="cargo" class="form-control" required>
                        </div>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Setor</label>
                        <input type="text" name="setor" class="form-control" required>
                    </div>
                    
                    <button type="submit" class="btn btn-success w-100">Salvar Cadastro</button>
                   <a href="{% url 'listagem_colaboradores' %}" class="btn btn-link w-100 mt-2">Ver Lista de Colaboradores</a>
                </form>
            </div>
        </div>
    </div>
    {% bootstrap_javascript %}
</body>
</html>
