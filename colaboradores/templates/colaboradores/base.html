<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistema EPI - Drevo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f4f7f6;
            display: flex;
            min-height: 100vh;
            margin: 0;
        }
        
       
        #sidebar {
            width: 280px;
            background-color: #212529;
            color: white;
            position: fixed;
            height: 100vh;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 4px 0 15px rgba(0,0,0,0.15);
            z-index: 1000;
        }

        
        .user-section {
            padding-bottom: 25px;
            border-bottom: 1px solid #3d4145;
            margin-bottom: 25px;
            text-align: center;
        }

        .user-photo {
            width: 85px;
            height: 85px;
            background: #495057;
            border-radius: 50%;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            font-weight: 600;
            color: #ffffff;
            border: 3px solid #0d6efd; 
        }

        
        .nav-link {
            color: #adb5bd;
            padding: 12px 15px;
            border-radius: 10px;
            margin-bottom: 5px;
            display: flex;
            align-items: center;
            text-decoration: none;
            transition: all 0.2s;
        }

        .nav-link:hover {
            background-color: rgba(255,255,255,0.08);
            color: white;
            transform: translateX(5px);
        }

        
        #main-content {
            flex: 1;
            margin-left: 280px; 
            padding: 40px;
            width: calc(100% - 280px);
        }

        
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 8px 20px rgba(0,0,0,0.06);
        }

        .alert {
            border-radius: 12px;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>

    <nav id="sidebar">
        <div class="user-section">
            <div class="user-photo">DR</div>
            <h5 class="mb-0 fw-bold">Diego Rigato</h5>
            <small class="text-muted">Desenvolvedor IT</small>
        </div>

        <div class="nav flex-column">
            <a href="{% url 'home' %}" class="nav-link">
                🏠 Início
            </a>
            <a href="{% url 'listagem_colaboradores' %}" class="nav-link">
                👤 Colaboradores
            </a>
            <a href="{% url 'cadastro_equipamento' %}" class="nav-link">
                🛡️ Novo EPI
            </a>
            <a href="{% url 'listagem_equipamentos' %}" class="nav-link">
                📋 Lista de EPIs
            </a>
            <a href="{% url 'novo_emprestimo' %}" class="nav-link">
                📦 Novo Empréstimo
            </a>
            <a href="{% url 'relatorio_emprestimos' %}" class="nav-link text-white">
                📋 Histórico de Empréstimos
            </a>
            <hr class="text-muted opacity-25 my-3">
            
            <a href="#" class="nav-link text-danger">
                🚪 Sair
            </a>
        </div>
        
        <div class="mt-auto pt-4 text-center">
            <small class="text-muted opacity-50" style="font-size: 0.75rem;">
                PROJETO INTEGRADOR<br>DREVO / SENAI
            </small>
        </div>
    </nav>

    <main id="main-content">
        
        {% if messages %}
            {% for message in messages %}
                <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow-sm" role="alert">
                    {{ message }}
                    <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                </div>
            {% endfor %}
        {% endif %}

        {% block conteudo %}
        {% endblock %}

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
