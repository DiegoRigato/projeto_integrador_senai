{% load django_bootstrap5 %}
{% bootstrap_css %}
{% bootstrap_javascript %}

<div class="container mt-5">
    <h2>Listagem de Colaboradores</h2>
    
    <form method="GET" class="d-flex mb-4">
        <input type="text" name="nome" class="form-control me-2" placeholder="Pesquisar por nome...">
        <button type="submit" class="btn btn-outline-primary">Pesquisar</button>
    </form>

    <table class="table table-striped">
        <thead>
            <tr>
                <th>Nome</th>
                <th>Cargo</th>
                <th>Ações</th>
            </tr>
        </thead>
        <tbody>
            {% for c in colaboradores %}
            <tr>
                <td>{{ c.nome }}</td>
                <td>{{ c.cargo }}</td>
                <td>
                    <button class="btn btn-danger btn-sm" data-bs-toggle="modal" data-bs-target="#modal{{c.id}}">Excluir</button>
                </td>
            </tr>

            <div class="modal fade" id="modal{{c.id}}" tabindex="-1">
                <div class="modal-dialog">
                    <div class="modal-content">
                        <div class="modal-header"><h5>Confirmar</h5></div>
                        <div class="modal-body">Deseja excluir {{ c.nome }}?</div>
                        <div class="modal-footer">
                            <a href="{% url 'excluir_colaborador' c.id %}" class="btn btn-danger">Confirmar Exclusão</a>
                            <button class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
                        </div>
                    </div>
                </div>
            </div>
            {% endfor %}
        </tbody>
    </table>
    <a href="{% url 'cadastrar_colaborador' %}" class="btn btn-success">Novo Cadastro</a>
</div>
